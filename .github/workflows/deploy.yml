name: Deploy Gradio App

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecución manual

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies with uv
        run: |
          uv sync

      - name: Run Gradio App with share=True
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        timeout-minutes: 2
        run: |
          # Cambiar share=False a share=True
          sed -i 's/share=False/share=True/g' app.py

          echo ""
          echo "=========================================="
          echo "🚀 Iniciando Gradio App..."
          echo "⏳ Esperando URL pública..."
          echo "=========================================="
          echo ""

          # Ejecutar con timeout, mostrando toda la salida y capturando la URL
          timeout 90s bash -c '
            uv run python app.py 2>&1 | while IFS= read -r line; do
              echo "$line"
              if echo "$line" | grep -q "Running on public URL:"; then
                PUBLIC_URL=$(echo "$line" | awk "{print \$NF}")
                sleep 1
                echo ""
                echo "=========================================="
                echo "✅ ¡Gradio iniciado correctamente!"
                echo ""
                echo "🌍 URL PÚBLICA: $PUBLIC_URL"
                echo ""
                echo "⚠️  Esta URL estará activa durante 72 horas"
                echo "=========================================="
                echo ""
                pkill -P $$ python
                exit 0
              fi
            done
          ' || true
