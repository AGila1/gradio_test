name: Deploy Gradio App

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecución manual

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies with uv
        run: |
          uv sync

      - name: Run Gradio App with share=True
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          PYTHONUNBUFFERED: 1
        timeout-minutes: 5
        run: |
          # Activar share=True
          sed -i 's/share=False/share=True/g' app.py

          echo "=========================================="
          echo "🚀 Iniciando Gradio App con share=True"
          echo "=========================================="
          echo ""

          # Ejecutar y dejar correr por 5 minutos (suficiente para ver URL)
          timeout 300s uv run python -u app.py || true

          echo ""
          echo "=========================================="
          echo "✅ Proceso finalizado"
          echo "=========================================="
