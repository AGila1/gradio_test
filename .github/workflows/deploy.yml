name: Deploy Gradio App

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecución manual

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies with uv
        run: |
          uv sync

      - name: Run Gradio App with share=True
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        timeout-minutes: 2
        run: |
          # Cambiar share=False a share=True
          sed -i 's/share=False/share=True/g' app.py

          # Ejecutar la app en background y capturar logs
          uv run python app.py > gradio.log 2>&1 &
          APP_PID=$!

          echo "🚀 Iniciando Gradio App (PID: $APP_PID)..."
          echo "⏳ Esperando URL pública de Gradio..."

          # Esperar hasta que aparezca la URL de Gradio (máximo 30 segundos)
          for i in {1..30}; do
            if grep -q "Running on public URL:" gradio.log; then
              echo ""
              echo "✅ ¡Gradio App iniciada correctamente!"
              echo ""
              echo "📋 LOGS COMPLETOS:"
              echo "===================="
              cat gradio.log
              echo "===================="
              echo ""

              # Extraer y mostrar la URL pública
              PUBLIC_URL=$(grep "Running on public URL:" gradio.log | awk '{print $NF}')
              echo "🌍 URL PÚBLICA: $PUBLIC_URL"
              echo ""
              echo "⚠️  Esta URL estará activa durante 72 horas"
              echo ""

              # Matar el proceso
              kill $APP_PID
              exit 0
            fi
            sleep 1
          done

          # Si llegamos aquí, timeout
          echo "❌ Timeout: No se pudo obtener la URL en 30 segundos"
          cat gradio.log
          kill $APP_PID
          exit 1
